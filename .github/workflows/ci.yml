name: CI

on:
  push:
    branches: [master, fix/release-hardening]
  pull_request:
    branches: [master]

env:
  PYTHONIOENCODING: utf-8
  QT_QPA_PLATFORM: offscreen

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Linux GUI runtime
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libegl1 libgl1 libglib2.0-0 libpulse0
      - name: Install base + dev
        run: |
          pip install -e ".[gui,dev,pptx]"
      - name: Run tests
        run: python -m pytest tests/ --ignore=tests/e2e -q --tb=short
      - name: CLI smoke
        run: python -c "from video2pptx.cli import app; from typer.testing import CliRunner; r=CliRunner().invoke(app, ['--help']); assert r.exit_code==0"

  gui-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with GUI extras
        run: |
          sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libglib2.0-0 libpulse0 xvfb
          pip install -e ".[gui,dev,pptx]"
      - name: GUI tests (offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest tests/gui tests/test_gui_*.py -q --tb=short

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel + sdist
        run: |
          pip install build twine
          python -m build
          python -m twine check dist/*
      - name: Install wheel + verify
        run: |
          pip install dist/*.whl
          pip check
          video2pptx --help
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
