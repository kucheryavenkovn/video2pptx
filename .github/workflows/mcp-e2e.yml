name: MCP E2E Smoke

on:
  push:
    branches: [master, "test/**"]
  pull_request:
    branches: [master]

env:
  PYTHON_VERSION: "3.12"
  QT_QPA_PLATFORM: offscreen

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg libegl1 libgl1 libpulse0
      - name: Install Python deps
        run: |
          pip install -e ".[gui,dev]"
      - name: Generate fixture video
        run: python tests/fixtures/gen_test_video.py
      - name: Unit + integration tests
        run: python -m pytest --ignore=tests/e2e -x -q

  mcp-gui-smoke:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg libegl1 libgl1 libpulse0 \
            libxkbcommon0 libdbus-1-3 \
            xvfb
      - name: Install Python deps
        run: |
          pip install -e ".[gui,dev]"
      - name: Generate fixture video
        run: python tests/fixtures/gen_test_video.py
      - name: Headless MCP GUI smoke (Xvfb)
        run: |
          xvfb-run -a python -m pytest tests/e2e/test_mcp_startup_characterization.py -x -v --timeout=120
        timeout-minutes: 5
      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: |
            report/
            .mcp_port
