# video2pptx — example configuration
# Copy to config.local.yaml (git-ignored) and adjust. CLI arguments override these.

video:
  sample_fps: 0.5
  decoder_backend: auto
  # Pass1 analysis only; null/omit override for native. Screenshots always full-res (Pass2).
  # Phase 19 Hermes golden mean: 480 → ~2.15× wall, extract −93%, gates PASS.
  # Evidence: benchmarks/detect/evidence/phase19-hermes-600s-20260718/golden_mean_decision.md
  analysis_max_side: 480

detection:
  slide_roi: auto
  ignore_rois: []
  threshold: auto
  min_slide_duration: 10.0
  min_stable_duration: 5.0
  dedupe_enabled: true
  export_md: false
  export_pptx: false

export:
  markdown_format: marp
  include_transcript_as_notes: true
  include_timecodes: true

debug:
  save_sampled_frames: false
  save_diff_scores: true
  save_timeline: true
  save_contact_sheet: true

logging:
  level: "INFO"
